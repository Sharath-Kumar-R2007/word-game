<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Word Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Antigravity</h1>
        <p id="hint"></p>
        <div id="wordDisplay"></div>
        <div class="input-group">
            <input type="text" id="guessInput" maxlength="1" placeholder="A" autocomplete="off">
            <button id="guessBtn">LAUNCH</button>
        </div>
        <p id="message"></p>
        <p class="stats">Wrong guesses: <span id="wrongGuesses"></span></p>
        <button id="restartBtn">Abort Mission (Restart)</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
